name: Release Charts

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "Shubham Tatvamasi"
          git config user.email "shubhamtatvamasi@gmail.com"

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_KEY_B64 }}" | base64 -d | gpg --batch --pinentry-mode loopback --passphrase "${{ secrets.GPG_KEY_PASSPHRASE }}" --import
          gpg --list-secret-keys
          gpg --batch --pinentry-mode loopback --passphrase "${{ secrets.GPG_KEY_PASSPHRASE }}" --export-secret-keys shubhamtatvamasi@gmail.com > ~/.gnupg/secring.gpg
          echo "${{ secrets.GPG_KEY_PASSPHRASE }}" > /tmp/gpg-passphrase

      - name: Install chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          install_only: true

      - name: Package charts with signing
        run: |
          cr package charts/portainer-run \
            --sign \
            --key "Shubham Tatvamasi" \
            --keyring ~/.gnupg/secring.gpg \
            --passphrase-file /tmp/gpg-passphrase

      - name: Upload release packages
        run: |
          cr upload --config .cr.yaml --owner ShubhamTatvamasi --git-repo portainer-run --token "${{ secrets.GITHUB_TOKEN }}" --make-release-latest false
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Update chart index
        run: |
          cr index --config .cr.yaml --owner ShubhamTatvamasi --git-repo portainer-run --token "${{ secrets.GITHUB_TOKEN }}" --push --index-path .
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
