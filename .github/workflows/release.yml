name: Release Charts

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "Shubham Tatvamasi"
          git config user.email "shubhamtatvamasi@gmail.com"

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_KEY_B64 }}" | base64 -d | gpg --batch --import
          gpg --list-secret-keys
          # helm package --sign requires the legacy secring format
          gpg --batch --export-secret-keys shubhamtatvamasi@gmail.com > ~/.gnupg/secring.gpg

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          config: .cr.yaml
