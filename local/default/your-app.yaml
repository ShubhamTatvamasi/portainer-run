apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: your-app-data
  namespace: default
  labels:
    app: your-app
    managed-by: portainer-run
  annotations:
    portainer-run/deploy-type: vibe
    portainer-run/git-target-id: 0daa0b9b-70fd-4de8-9c8f-7dc69ab79b1e
    portainer-run/git-branch: main
    portainer-run/git-path: local/default/your-app.yaml
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: your-app
  namespace: default
  labels:
    app: your-app
    managed-by: portainer-run
  annotations:
    portainer-run/deploy-type: vibe
    portainer-run/git-target-id: 0daa0b9b-70fd-4de8-9c8f-7dc69ab79b1e
    portainer-run/git-branch: main
    portainer-run/git-path: local/default/your-app.yaml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: your-app
  template:
    metadata:
      labels:
        app: your-app
        managed-by: portainer-run
    spec:
      initContainers:
        - name: vibe-sync
          image: alpine/git:latest
          command:
            - sh
            - '-c'
            - >-
              git config --global http.sslVerify false && git clone --depth 1 --branch main
              https://${GIT_USERNAME}:${GIT_TOKEN}@github.com/ShubhamTatvamasi/portainer-run /tmp/repo && mkdir -p
              /usr/share/nginx/html && cp -r /tmp/repo/. /usr/share/nginx/html/ && rm -rf /tmp/repo
          volumeMounts:
            - name: app-data
              mountPath: /usr/share/nginx/html
          env:
            - name: GIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: your-app-git-credentials
                  key: username
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: your-app-git-credentials
                  key: token
      containers:
        - name: your-app
          image: nginx:alpine
          workingDir: /usr/share/nginx/html
          ports:
            - containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: app-data
              mountPath: /usr/share/nginx/html
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: your-app-data
---
apiVersion: v1
kind: Service
metadata:
  name: your-app
  namespace: default
  labels:
    app: your-app
    managed-by: portainer-run
  annotations:
    portainer-run/deploy-type: vibe
    portainer-run/git-target-id: 0daa0b9b-70fd-4de8-9c8f-7dc69ab79b1e
    portainer-run/git-branch: main
    portainer-run/git-path: local/default/your-app.yaml
spec:
  type: NodePort
  selector:
    app: your-app
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
