{{- if and .Values.secret.create (not .Values.secret.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "portainer-run.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "portainer-run.labels" . | nindent 4 }}
type: Opaque
stringData:
  ENCRYPTION_KEY: {{ include "portainer-run.encryptionKey" . | quote }}
  {{- with .Values.secret.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secret.openaiApiKey }}
  OPENAI_API_KEY: {{ . | quote }}
  {{- end }}
{{- end }}
