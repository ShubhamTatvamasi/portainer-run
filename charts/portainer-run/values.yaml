# Default values for portainer-run.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Scaling beyond 1 is not recommended — the PVC uses ReadWriteOnce which only
# allows one pod at a time. Use ReadWriteMany storage and set
# persistence.accessMode: ReadWriteMany before increasing replicas.
replicaCount: 1

image:
  repository: portainer/portainer-run
  # Always is recommended for floating tags (latest, develop). Switch to
  # IfNotPresent if you pin to a specific immutable tag in production.
  pullPolicy: Always

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}

# Non-sensitive configuration rendered into a ConfigMap and mounted via envFrom.
# See https://github.com/portainer/portainer-run for the full list of options.
config:
  # URL of the Portainer instance Portainer-Run connects to.
  # In-cluster:  https://portainer.portainer.svc.cluster.local:9443
  # External:    https://portainer.example.com:9443
  PORTAINER_URL: "https://portainer.portainer.svc.cluster.local:9443"

  # Feature flags — set to "true"/"false" as needed.
  FEATURE_VIBE_DEPLOY: "true"
  FEATURE_SIMPLE_DEPLOY: "false"
  FEATURE_MANIFEST_BUILDER: "false"
  FEATURE_CATALOGUE: "false"
  FEATURE_SECRETS: "false"
  # TEMPLATE_URL: "https://your-server.com/templates.json"
  # BASE_DOMAIN: "apps.example.com"
  # OPENAI_MODEL: "gpt-4o"
  # CACHE_DIR: "/app/data"

# Sensitive values.
# To use a pre-existing Secret instead of creating one, set existingSecret to
# its name. The Secret must provide: ENCRYPTION_KEY and optionally
# ANTHROPIC_API_KEY / OPENAI_API_KEY.
secret:
  existingSecret: ""
  # Encrypts stored Git credentials at rest. Minimum 32 chars.
  # Leave empty to auto-generate on first install (key is preserved across
  # upgrades and never rotated — rotating it makes the database unreadable).
  # Generate manually with: openssl rand -hex 32
  encryptionKey: ""
  # Anthropic (Claude) API key. Optional; auto-detected when set.
  anthropicApiKey: ""
  # OpenAI API key. Optional alternative to Anthropic.
  openaiApiKey: ""

# TLS certificate served by the pod on port 443.
# By default Portainer-Run generates a self-signed cert at startup. To serve a
# real/trusted cert instead, point existingSecret at a kubernetes.io/tls Secret.
# The cert is mounted into the pod and Portainer-Run is pointed at it via
# SSL_CERT / SSL_KEY / SSL_CERT_DIR env vars.
tls:
  existingSecret: ""
  mountPath: /certs
  certKey: tls.crt
  keyKey: tls.key

service:
  type: ClusterIP
  httpsPort: 443
  httpPort: 80
  # The backend only serves HTTPS (port 80 redirects to 443). Tell your ingress
  # controller to connect to the backend over HTTPS via service annotations
  # (these must be on the Service object, not the Ingress):
  #
  # Traefik (also requires a ServersTransport CRD with insecureSkipVerify: true):
  #   traefik.ingress.kubernetes.io/service.serverstransport: "<namespace>-<name>@kubernetescrd"
  #
  # nginx:
  #   nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
  annotations: {}

ingress:
  enabled: false
  ingressClassName: ""
  annotations: {}
  # Hosts and paths are of type array.
  hosts:
    - host: portainer-run.chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: portainer-run-tls
    #   hosts:
    #     - portainer-run.chart-example.local

persistence:
  enabled: true
  size: 1Gi
  accessMode: ReadWriteOnce
  storageClass: ""
  existingClaim: ""
  annotations: {}
  mountPath: /app/data

# DNS configuration for the pod. Enabled by default with ndots=1 to reduce
# unnecessary DNS search-domain expansion when resolving in-cluster hostnames
# (e.g. portainer.portainer.svc.cluster.local). Set enabled: false if your
# cluster DNS is already tuned or you are not using in-cluster Portainer URLs.
dnsConfig:
  enabled: true
  ndots: "1"
  nameservers: []
  searches: []
  options: []

# Extra environment variables for the container.
# Supports plain values and valueFrom references (secretKeyRef, configMapKeyRef).
extraEnv: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /config
    port: https
    scheme: HTTPS
  initialDelaySeconds: 15
  periodSeconds: 30
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /config
    port: https
    scheme: HTTPS
  initialDelaySeconds: 10
  periodSeconds: 10

podSecurityContext: {}

securityContext: {}
